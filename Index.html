<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Spell Combination Codex</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Rajdhani:wght@300;400;600&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  background: #070b14;
  color: #e0e8ff;
  font-family: 'Rajdhani', sans-serif;
  min-height: 100vh;
  overflow: hidden;
  user-select: none;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(1px 1px at 10% 20%, rgba(180,200,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 30% 60%, rgba(180,200,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 50% 10%, rgba(200,210,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 70% 80%, rgba(180,200,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 90% 40%, rgba(200,210,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 20% 90%, rgba(180,200,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 80% 15%, rgba(180,200,255,0.4) 0%, transparent 100%);
  pointer-events: none;
  z-index: 0;
}

header {
  text-align: center;
  padding: 1rem 1rem 0.4rem;
  position: relative;
  z-index: 10;
}
header h1 {
  font-family: 'Cinzel', serif;
  font-size: clamp(1rem, 3.5vw, 2rem);
  letter-spacing: 0.12em;
  background: linear-gradient(135deg, #a78bfa, #60a5fa, #34d399);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
header p { color: #445870; font-size: 0.72rem; letter-spacing: 0.08em; margin-top: 2px; }

.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
  justify-content: center;
  padding: 0.4rem 1rem;
  position: relative;
  z-index: 10;
}
.controls input {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(120,140,200,0.3);
  color: #e0e8ff;
  padding: 0.38rem 0.7rem;
  border-radius: 6px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 0.85rem;
  width: 160px;
  outline: none;
}
.controls input::placeholder { color: #334; }
.controls select {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(120,140,200,0.3);
  color: #e0e8ff;
  padding: 0.38rem 0.5rem;
  border-radius: 6px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 0.85rem;
  outline: none;
}
.controls select option { background: #0f1628; }
.btn {
  background: rgba(100,100,200,0.15);
  border: 1px solid rgba(120,140,255,0.3);
  color: #a0b4ff;
  padding: 0.38rem 0.7rem;
  border-radius: 6px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 0.8rem;
  cursor: pointer;
  transition: all 0.2s;
}
.btn:hover { background: rgba(100,100,200,0.3); }
.btn.active {
  background: rgba(52,211,153,0.2);
  border-color: rgba(52,211,153,0.5);
  color: #34d399;
}

.main {
  display: grid;
  grid-template-columns: 220px 1fr;
  gap: 0.5rem;
  padding: 0 0.5rem 0.5rem;
  position: relative;
  z-index: 5;
  height: calc(100vh - 108px);
}
@media (max-width: 700px) {
  .main { grid-template-columns: 1fr; }
  .sidebar { display: none; }
}

.sidebar {
  background: rgba(15,22,45,0.85);
  border: 1px solid rgba(80,100,180,0.2);
  border-radius: 10px;
  padding: 0.7rem;
  overflow-y: auto;
  backdrop-filter: blur(8px);
}
.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-thumb { background: rgba(100,120,200,0.3); border-radius: 4px; }
.sidebar h3 { font-family:'Cinzel',serif; font-size:0.68rem; letter-spacing:0.15em; color:#445870; margin-bottom:0.5rem; text-transform:uppercase; }
.node-item {
  padding: 0.3rem 0.55rem;
  border-radius: 5px;
  border: 1px solid transparent;
  cursor: pointer;
  font-size: 0.8rem;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 0.4rem;
  margin-bottom: 2px;
}
.node-item:hover { background: rgba(255,255,255,0.05); }
.node-item.active { background: rgba(100,120,255,0.15); border-color: rgba(140,160,255,0.4); color: #c0d0ff; }
.node-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

.graph-area {
  background: rgba(10,16,35,0.75);
  border: 1px solid rgba(60,80,160,0.2);
  border-radius: 10px;
  overflow: hidden;
  position: relative;
}
.stat-bar {
  display: flex;
  gap: 1rem;
  padding: 0.28rem 0.8rem;
  border-bottom: 1px solid rgba(60,80,160,0.2);
  font-size: 0.72rem;
  color: #445870;
}
.stat-bar span { color: #7080a0; }

svg { width: 100%; height: calc(100% - 30px); display: block; }

.link { fill: none; stroke-width: 1.2; opacity: 0.28; transition: opacity 0.2s, stroke-width 0.2s; marker-end: url(#arrowhead); }
.link.highlighted { opacity: 0.85; stroke-width: 2.2; }
.link.locked-line { opacity: 0.9; stroke-width: 2.4; marker-end: url(#arrowhead-locked); }
.link.grayed-line { opacity: 0.18; stroke-width: 1; }
.link.dimmed { opacity: 0.04; }
.node-circle { cursor: pointer; }
.node-label { font-family:'Rajdhani',sans-serif; font-size:10px; fill:#8090b8; text-anchor:middle; pointer-events:none; font-weight:600; }

/* ── INFO PANEL ── */
.info-panel {
  position: absolute;
  top: 38px;
  left: 0.5rem;
  right: 58px;
  background: rgba(7,12,30,0.97);
  border: 1px solid rgba(100,120,220,0.3);
  border-radius: 10px;
  padding: 0.6rem 0.8rem;
  transition: opacity 0.2s, transform 0.2s;
  overflow: visible;
  z-index: 10;
}
.info-panel.hidden { opacity:0; pointer-events:none; transform:translateY(-6px); }
.info-panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 0.45rem;
}
.info-title { font-family:'Cinzel',serif; font-size:0.82rem; color:#a0b4e0; }
.info-close {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(100,120,200,0.2);
  color: #445870;
  width: 22px; height: 22px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 0.8rem;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.15s;
}
.info-close:hover { background: rgba(255,255,255,0.1); color: #a0b4ff; }
.combo-list {
  display: flex;
  flex-direction: column;
  gap: 3px;
  max-height: calc(5 * 42px);
  overflow-y: auto;
  padding-right: 2px;
}
.combo-list::-webkit-scrollbar { width: 3px; }
.combo-list::-webkit-scrollbar-track { background: transparent; }
.combo-list::-webkit-scrollbar-thumb { background: rgba(100,120,200,0.3); border-radius: 4px; }

.combo-tag {
  background: rgba(20,30,65,0.9);
  border: 1px solid rgba(60,80,160,0.25);
  border-radius: 7px;
  padding: 0.32rem 0.6rem;
  font-size: 0.78rem;
  color: #6878a8;
  display: flex;
  align-items: center;
  gap: 0.35rem;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: background 0.15s, border-color 0.15s;
  touch-action: manipulation;
  min-height: 36px;
}
.combo-tag:hover { background: rgba(40,55,110,0.9); border-color: rgba(100,120,220,0.35); }
.combo-tag.locked-tag { border-color: rgba(251,191,36,0.45); background: rgba(40,35,15,0.8); }
.combo-tag.used-tag {
  background: rgba(20,22,28,0.9);
  border-color: rgba(50,55,65,0.4);
  color: #3a4050;
}
.combo-tag.used-tag .partner { color: #3a4255 !important; }
.combo-tag.used-tag .result { color: #3a4a44; }
.combo-tag .partner { font-weight:600; flex-shrink:0; }
.combo-tag .arrow { color:#2a3a60; font-size:0.65rem; flex-shrink:0; }
.combo-tag .result { color:#34d399; font-weight:700; flex:1; }
.combo-tag .lock-icon { font-size:0.7rem; flex-shrink:0; color:#fbbf24; }

.hold-progress {
  position: absolute;
  inset: 0;
  background: rgba(140,100,255,0.1);
  transform: scaleX(0);
  transform-origin: left;
  border-radius: 7px;
  pointer-events: none;
  transition: none;
}
.combo-tag.holding .hold-progress {
  transform: scaleX(1);
  transition: transform 1.5s linear;
}

.action-tabs {
  position: absolute;
  inset: 0;
  display: flex;
  border-radius: 7px;
  overflow: hidden;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.18s;
  z-index: 5;
}
.action-tabs.visible { opacity:1; pointer-events:all; }

.action-tab-cancel {
  flex:1;
  background: rgba(160,30,30,0.9);
  display:flex; align-items:center; justify-content:center;
  font-size:0.75rem; font-weight:700; color:#ffaaaa;
  letter-spacing:0.05em; cursor:pointer;
  border-right: 1px solid rgba(255,255,255,0.08);
  transition: background 0.15s;
}
.action-tab-cancel:hover { background: rgba(200,40,40,0.95); }
.action-tab-lock {
  flex:1;
  background: rgba(30,110,55,0.9);
  display:flex; align-items:center; justify-content:center;
  font-size:0.75rem; font-weight:700; color:#aaffbb;
  letter-spacing:0.05em; cursor:pointer;
  transition: background 0.15s;
}
.action-tab-lock:hover { background: rgba(40,150,70,0.95); }

.combo-tag.action-shown {
  box-shadow: 0 0 0 2px rgba(160,200,255,0.5);
  border-color: rgba(160,200,255,0.4) !important;
}

/* ── WISHLIST TAB ── */
.wishlist-tab {
  position: fixed;
  right: -4px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 200;
  background: linear-gradient(135deg, #251850, #152040);
  border: 1px solid rgba(150,120,255,0.4);
  border-right: none;
  border-radius: 10px 0 0 10px;
  padding: 1rem 0.55rem;
  cursor: pointer;
  writing-mode: vertical-rl;
  font-family: 'Cinzel', serif;
  font-size: 0.6rem;
  letter-spacing: 0.18em;
  color: #9080d0;
  transition: right 0.3s, background 0.2s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  box-shadow: -4px 0 20px rgba(80,60,180,0.25);
}
.wishlist-tab:hover { right: 0; background: linear-gradient(135deg, #352870, #253060); }
.tab-count {
  writing-mode: horizontal-tb;
  background: rgba(150,120,255,0.25);
  border-radius: 50%;
  width: 20px; height: 20px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.72rem;
  font-family: 'Rajdhani', sans-serif;
  color: #b0a0ff;
  font-weight: 700;
}

/* ── WISHLIST PANEL ── */
.wishlist-panel {
  position: fixed;
  top: 0; right: 0;
  width: min(310px, 88vw);
  height: 100vh;
  background: linear-gradient(180deg, #0b1025 0%, #070d1e 100%);
  border-left: 1px solid rgba(110,90,220,0.3);
  z-index: 300;
  transform: translateX(100%);
  transition: transform 0.32s cubic-bezier(0.4,0,0.2,1);
  display: flex;
  flex-direction: column;
  box-shadow: -12px 0 50px rgba(0,0,0,0.7);
}
.wishlist-panel.open { transform: translateX(0); }

.wishlist-header {
  padding: 1.2rem 1rem 0.7rem;
  border-bottom: 1px solid rgba(90,70,200,0.2);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.wishlist-header h2 {
  font-family: 'Cinzel', serif;
  font-size: 0.85rem;
  letter-spacing: 0.15em;
  background: linear-gradient(90deg,#a78bfa,#60a5fa);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.wishlist-close {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(100,80,180,0.25);
  color: #506080;
  width: 26px; height: 26px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.9rem;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.wishlist-close:hover { background: rgba(255,255,255,0.1); color: #a0b4ff; }

.wishlist-slots {
  flex:1;
  padding: 0.8rem;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  overflow-y: auto;
}

.wishlist-hint {
  color: #1e2a45;
  font-size: 0.78rem;
  text-align: center;
  margin-top: 0.5rem;
  line-height: 1.7;
  letter-spacing: 0.04em;
}

.slot {
  background: rgba(16,24,52,0.9);
  border: 1px solid rgba(70,90,170,0.25);
  border-radius: 10px;
  padding: 0.65rem 0.85rem;
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s;
  cursor: pointer;
  min-height: 70px;
  touch-action: manipulation;
}
.slot:hover { border-color: rgba(110,130,240,0.35); }
.slot.empty {
  border-style: dashed;
  border-color: rgba(50,70,130,0.2);
  display: flex; align-items: center; justify-content: center;
  cursor: default;
}
.slot.empty:hover { border-color: rgba(50,70,130,0.2); }
.slot-empty-label { color: #1a2438; font-size: 0.72rem; letter-spacing: 0.1em; }

.slot-result { font-family:'Cinzel',serif; font-size:0.85rem; color:#34d399; margin-bottom:0.25rem; }
.slot-ingredients { font-size:0.72rem; color:#333e5a; display:flex; align-items:center; gap:0.4rem; }
.slot-ingredients .ing { color:#4a5878; }
.slot-ingredients .plus { color:#222c40; }
.slot-number { position:absolute; top:0.45rem; right:0.65rem; font-size:0.6rem; color:#1e2840; font-family:'Cinzel',serif; }

.slot-hold-bar {
  position: absolute;
  bottom: 0; left: 0;
  height: 2px;
  background: rgba(220,60,60,0.75);
  width: 0%;
  border-radius: 0 2px 2px 0;
  transition: none;
}
.slot.holding .slot-hold-bar {
  width: 100%;
  transition: width 3s linear;
}

.trash-overlay {
  position: absolute;
  top: 0; right: 0; bottom: 0;
  width: 33.33%;
  background: rgba(170,25,25,0.93);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
  transform: translateX(100%);
  transition: transform 0.24s cubic-bezier(0.4,0,0.2,1);
  border-radius: 0 10px 10px 0;
  cursor: pointer;
  z-index: 5;
}
.slot.trash-active .trash-overlay { transform: translateX(0); }

.wishlist-footer {
  padding: 0.7rem 1rem;
  border-top: 1px solid rgba(70,90,170,0.15);
  font-size: 0.68rem;
  color: #1e2840;
  text-align: center;
  letter-spacing: 0.06em;
}

/* ── SWAP MODAL ── */
.swap-modal {
  position: fixed; inset: 0; z-index: 500;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,8,0.75);
  backdrop-filter: blur(7px);
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s;
}
.swap-modal.active { opacity:1; pointer-events:all; }
.swap-box {
  background: linear-gradient(160deg,#0e1830,#08101e);
  border: 1px solid rgba(120,100,220,0.4);
  border-radius: 14px;
  padding: 1.2rem 1.3rem;
  width: min(290px, 84vw);
  box-shadow: 0 20px 60px rgba(0,0,0,0.85);
}
.swap-box h3 { font-family:'Cinzel',serif; font-size:0.82rem; letter-spacing:0.14em; color:#9080d0; margin-bottom:0.25rem; }
.swap-box p { font-size:0.76rem; color:#3a4860; margin-bottom:0.85rem; }
.swap-new {
  background: rgba(20,30,65,0.7);
  border: 1px solid rgba(70,90,170,0.3);
  border-radius: 8px;
  padding: 0.5rem 0.75rem;
  margin-bottom: 0.85rem;
}
.swap-new .res { color:#34d399; font-weight:700; font-size:0.88rem; font-family:'Cinzel',serif; }
.swap-new .ings { color:#3a4860; font-size:0.72rem; margin-top:2px; }

.swap-slots { display:flex; flex-direction:column; gap:0.35rem; margin-bottom:0.85rem; }
.swap-slot-btn {
  background: rgba(16,24,52,0.9);
  border: 1px solid rgba(70,90,160,0.25);
  border-radius: 8px;
  padding: 0.48rem 0.75rem;
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
  font-family: 'Rajdhani', sans-serif;
  color: #7080a8;
  font-size: 0.78rem;
  display: flex; align-items: center; gap: 0.5rem;
  width: 100%;
}
.swap-slot-btn:hover { background: rgba(50,60,130,0.7); border-color: rgba(130,150,255,0.4); color:#c0d0ff; }
.swap-slot-btn .ss-num { color:#1e2840; font-size:0.68rem; width:14px; }
.swap-slot-btn .ss-result { color:#34d399; font-weight:700; flex:1; }
.swap-slot-btn .ss-ings { color:#2a3450; font-size:0.7rem; }

.swap-cancel-btn {
  width: 100%;
  background: rgba(70,20,20,0.45);
  border: 1px solid rgba(160,50,50,0.3);
  border-radius: 8px;
  padding: 0.48rem;
  color: #a05050;
  cursor: pointer;
  font-family: 'Rajdhani', sans-serif;
  font-size: 0.8rem;
  letter-spacing: 0.08em;
  transition: all 0.15s;
}
.swap-cancel-btn:hover { background: rgba(110,30,30,0.55); }
</style>
</head>
<body>


<header>
  <h1>✦ Spell Combination Codex ✦</h1>
  <p>Tap a node · Hold a result 3s to lock · Slide tab → wishlist</p>
</header>

<div class="controls">
  <input type="text" id="searchInput" placeholder="Search spell or result…" />
  <select id="filterSelect"><option value="all">All Spells</option></select>
  <button class="btn" onclick="resetView()">Reset</button>
  <button class="btn" onclick="clearSelection()">Clear</button>
  <button class="btn" id="viewModeBtn" onclick="toggleViewMode()">👁 View</button>
</div>

<div class="main">
  <div class="sidebar">
    <h3>Spell Elements</h3>
    <div id="nodeList"></div>
  </div>
  <div class="graph-area" id="graphArea">
    <div class="stat-bar" id="statBar"></div>
    <svg id="svg"></svg>
    <div class="info-panel hidden" id="infoPanel">
      <div class="info-panel-header">
        <div class="info-title" id="infoTitle"></div>
        <div class="info-close" onclick="document.getElementById('infoPanel').classList.add('hidden')">✕</div>
      </div>
      <div class="combo-list" id="comboList"></div>
    </div>
  </div>
</div>

<!-- Wishlist sticky tab -->
<div class="wishlist-tab" id="wishlistTab" onclick="toggleWishlist()">
  <span>WISHLIST</span>
  <div class="tab-count" id="tabCount">0</div>
</div>

<!-- Wishlist panel -->
<div class="wishlist-panel" id="wishlistPanel">
  <div class="wishlist-header">
    <h2>✦ Locked Combos</h2>
    <div class="wishlist-close" onclick="toggleWishlist()">✕</div>
  </div>
  <div class="wishlist-slots" id="wishlistSlots"></div>
  <div class="wishlist-footer">Hold a slot 3s · Tap 🗑️ to remove</div>
</div>

<!-- Swap modal -->
<div class="swap-modal" id="swapModal">
  <div class="swap-box">
    <h3>SLOTS FULL</h3>
    <p>Replace a locked combo, or cancel.</p>
    <div class="swap-new" id="swapNewCombo"></div>
    <div class="swap-slots" id="swapSlotList"></div>
    <button class="swap-cancel-btn" onclick="closeSwapModal()">✕ Cancel</button>
  </div>
</div>

<script>
// ─── DATA ─────────────────────────────────────────────────────────────────────
const combinations = [
  ["Arcane Ray","Flash Shock","Energy Bombardment"],
  ["Arcane Ray","Satellite","Plasma Ray"],
  ["Arcane Ray","Spirit","Genocide"],
  ["Arcane Ray","Electric Shock","Terra Current"],
  ["Arcane Ray","Magic Bolt","Prism Ray"],
  ["Incineration","Arcane Ray","Breath of Fire"],
  ["Blizzard","Incineration","Ether Blaze"],
  ["Blizzard","Fireball","Genesis"],
  ["Blizzard","Fireball","Winter Storm"],
  ["Incineration","Blizzard","Hellfire"],
  ["Meteor","Blizzard","Great Impact"],
  ["Meteor","Blizzard","War Climate"],
  ["Thunderstorm","Blizzard","Orbital Strike"],
  ["Tsunami","Blizzard","Phoenix"],
  ["Cyclone","Electric Zone","Super Cyclone"],
  ["Cyclone","Satellite","Neutron Generation"],
  ["Cyclone","Magic Bolt","Ruler of Storms"],
  ["Cyclone","Satellite","Vortex"],
  ["Cyclone","Satellite","Black Hole"],
  ["Tsunami","Cyclone","Great Flood"],
  ["Electric Shock","Spirit","Current Overload"],
  ["Electric Shock","Energy Bolt","Heart of Lightning"],
  ["Electric Shock","Incineration","Lightning Breath"],
  ["Electric Zone","Electric Shock","Meissner Effect"],
  ["Spirit","Electric Shock","Telekinetic Sword"],
  ["Thunderstorm","Electric Shock","Lightning Bolts"],
  ["Electric Zone","Satellite","Lightning Calibration"],
  ["Electric Zone","Shield","Destroyer"],
  ["Electric Zone","Frost Nova","Frozen Heart"],
  ["Satellite","Electric Zone","Magnetic Field"],

const nodeColors = {
  "Arcane Ray":"#a855f7","Blizzard":"#60a5fa","Cyclone":"#34d399",
  "Electric Shock":"#fbbf24","Electric Zone":"#f59e0b","Energy Bolt":"#f97316",
  "Fireball":"#ef4444","Flash Shock":"#facc15","Frost Nova":"#93c5fd",
  "Incineration":"#fb923c","Lava Zone":"#dc2626","Magic Bolt":"#c084fc",
  "Meteor":"#f87171","Satellite":"#818cf8","Spirit":"#a78bfa",
  "Thunderstorm":"#6366f1","Tsunami":"#38bdf8","Shield":"#22d3ee",
  "Cloaking":"#64748b","Magic Circle":"#e879f9","Intelligence":"#4ade80",
  "Arcane Effuse":"#7c3aed","Concentration":"#84cc16",
};
function getColor(n){ return nodeColors[n]||"#94a3b8"; }

const sourceNodeSet = new Set();
combinations.forEach(([a,b])=>{ sourceNodeSet.add(a); sourceNodeSet.add(b); });
const allNodes = Array.from(sourceNodeSet).sort();

// ─── STATE ────────────────────────────────────────────────────────────────────
let selectedNode = null;
let positions = {};
let transform = {x:0,y:0,scale:1};
let isDragging = false, dragStart={x:0,y:0};
let wishlist = [];
let wishlistOpen = false;
let swapPending = null;
let holdTimer = null;
let slotTimers = {};
let viewMode = false;

// ─── LAYOUT ───────────────────────────────────────────────────────────────────
function computeLayout(W,H){
  const cx=W/2, cy=H/2, r=Math.min(W,H)*0.46, n=allNodes.length;
  allNodes.forEach((node,i)=>{
    const angle=(i/n)*2*Math.PI-Math.PI/2;
    positions[node]={x:cx+r*Math.cos(angle),y:cy+r*Math.sin(angle)};
  });
}

// ─── SIDEBAR ──────────────────────────────────────────────────────────────────
function buildSidebar(){
  const list=document.getElementById('nodeList');
  list.innerHTML='';
  allNodes.forEach(node=>{
    const el=document.createElement('div');
    el.className='node-item'; el.dataset.node=node;
    el.innerHTML=`<div class="node-dot" style="background:${getColor(node)}"></div>${node}`;
    el.onclick=()=>selectNode(node);
    list.appendChild(el);
  });
  const sel=document.getElementById('filterSelect');
  allNodes.forEach(node=>{
    const opt=document.createElement('option');
    opt.value=node; opt.textContent=node; sel.appendChild(opt);
  });
  sel.onchange=()=>sel.value!=='all'?selectNode(sel.value):clearSelection();
}

function buildStatBar(){
  const results=new Set(combinations.map(c=>c[2]));
  document.getElementById('statBar').innerHTML=
    `<div>Spells: <span>${allNodes.length}</span></div><div>Combos: <span>${combinations.length}</span></div><div>Results: <span>${results.size}</span></div>`;
}

// ─── RENDER SVG ───────────────────────────────────────────────────────────────
let gEl;

function render(){
  const area=document.getElementById('graphArea');
  const svgEl=document.getElementById('svg');
  const W=area.clientWidth, H=area.clientHeight-30;
  svgEl.setAttribute('viewBox',`0 0 ${W} ${H}`);
  computeLayout(W,H);

  svgEl.innerHTML=`
    <defs>
      <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
        <path d="M0,0 L6,3 L0,6 Z" fill="rgba(100,120,200,0.5)"/>
      </marker>
      <marker id="arrowhead-locked" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
        <path d="M0,0 L6,3 L0,6 Z" fill="rgba(251,191,36,0.9)"/>
      </marker>
    </defs>
    <g id="mainGroup" transform="translate(${transform.x},${transform.y}) scale(${transform.scale})"></g>
  `;
  gEl=document.getElementById('mainGroup');

  // Deduplicated links
  const seenLinks = new Set();
  combinations.forEach(([a,b,result])=>{
    if(!positions[a]||!positions[b]) return;
    const key=`${[a,b].sort().join('|')}|${result}`;
    if(seenLinks.has(key)) return;
    seenLinks.add(key);
    const isLocked=wishlist.some(w=>w.result===result);
    const hidden=!isLocked && isLinkHidden(a,b,result);
    const grayed=!isLocked && isLinkGrayed(a,b,result);
    const pa=positions[a], pb=positions[b];
    const line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',pa.x); line.setAttribute('y1',pa.y);
    line.setAttribute('x2',pb.x); line.setAttribute('y2',pb.y);
    if(hidden){
      line.setAttribute('display','none');
    } else if(isLocked){
      line.setAttribute('class','link locked-line');
      line.setAttribute('stroke','#fbbf24');
      line.setAttribute('marker-end','url(#arrowhead-locked)');
    } else if(grayed){
      line.setAttribute('class','link grayed-line');
      line.setAttribute('stroke','#3a4050');
      line.setAttribute('marker-end','url(#arrowhead)');
    } else {
      line.setAttribute('class','link');
      line.setAttribute('stroke',getColor(a));
      line.setAttribute('marker-end','url(#arrowhead)');
    }
    line.dataset.a=a; line.dataset.b=b; line.dataset.result=result;
    gEl.appendChild(line);
  });

  // Nodes
  const usedNodes = getUsedSpells();
  allNodes.forEach(node=>{
    const p=positions[node];
    const isGrayed = usedNodes.has(node);
    const color = isGrayed ? '#4a4f5a' : getColor(node);
    const strokeColor = isGrayed ? '#5a6070' : getColor(node);
    const g=document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('transform',`translate(${p.x},${p.y})`);
    g.setAttribute('class','node-circle'); g.dataset.node=node;
    g.dataset.grayed=isGrayed?'1':'0';
    const outer=document.createElementNS('http://www.w3.org/2000/svg','circle');
    outer.setAttribute('r',30);
    outer.setAttribute('fill', isGrayed ? 'rgba(60,65,75,0.3)' : `${getColor(node)}1e`);
    outer.setAttribute('stroke', strokeColor);
    outer.setAttribute('stroke-width','2');
    if(isGrayed) outer.setAttribute('stroke-dasharray','4,3');
    g.appendChild(outer);
    const inner=document.createElementNS('http://www.w3.org/2000/svg','circle');
    inner.setAttribute('r',13);
    inner.setAttribute('fill', isGrayed ? '#3a3f4a' : getColor(node));
    inner.setAttribute('opacity', isGrayed ? '0.5' : '0.85');
    g.appendChild(inner);
    node.split(' ').forEach((word,i)=>{
      const t=document.createElementNS('http://www.w3.org/2000/svg','text');
      t.setAttribute('class','node-label');
      t.setAttribute('y',43+i*13);
      t.setAttribute('fill', isGrayed ? '#555e6e' : '#8090b8');
      t.textContent=word;
      g.appendChild(t);
    });
    g.onclick=()=>selectNode(node);
    gEl.appendChild(g);
  });

  applySelection();
}

// ─── USED SPELLS ─────────────────────────────────────────────────────────────
function getUsedSpells(){
  // Returns set of ingredient nodes currently used by any locked combo
  const used = new Set();
  if(!viewMode) wishlist.forEach(w=>{ used.add(w.a); used.add(w.b); });
  return used;
}

function isLinkGrayed(a, b, result){
  if(viewMode) return false;
  const used = getUsedSpells();
  const isLockedCombo = wishlist.some(w=>w.result===result);
  if(isLockedCombo) return false;
  // Gray if EITHER ingredient is used by any locked combo
  return used.has(a) || used.has(b);
}

function isLinkHidden(a, b, result){
  if(viewMode) return false;
  const used = getUsedSpells();
  if(wishlist.some(w=>w.result===result)) return false;
  const aGray = used.has(a);
  const bGray = used.has(b);
  // Hide links that cross the gray/normal boundary
  return aGray !== bGray;
}

// ─── SELECTION ────────────────────────────────────────────────────────────────
function selectNode(name){
  selectedNode=name;
  document.querySelectorAll('.node-item').forEach(el=>el.classList.toggle('active',el.dataset.node===name));
  document.getElementById('filterSelect').value=name;
  applySelection();
  if(!viewMode) showInfo(name);
}

function applySelection(){
  if(!gEl) return;
  const links=gEl.querySelectorAll('.link, .locked-line, .grayed-line');
  const nodes=gEl.querySelectorAll('.node-circle');
  const used=getUsedSpells();

  if(!selectedNode){
    links.forEach(l=>{
      if(l.getAttribute('display')==='none') return;
      l.classList.remove('highlighted','dimmed');
    });
    nodes.forEach(n=>n.style.opacity='1');
    return;
  }

  const connected=new Set([selectedNode]);
  combinations.forEach(([a,b])=>{
    if(a===selectedNode) connected.add(b);
    if(b===selectedNode) connected.add(a);
  });

  links.forEach(l=>{
    if(l.getAttribute('display')==='none') return;
    const rel=l.dataset.a===selectedNode||l.dataset.b===selectedNode;
    l.classList.toggle('highlighted',rel);
    l.classList.toggle('dimmed',!rel);
  });

  nodes.forEach(n=>{
    if(connected.has(n.dataset.node)){
      n.style.opacity='1';
    } else {
      n.style.opacity='0.15';
    }
  });
}

function clearSelection(){
  selectedNode=null;
  document.querySelectorAll('.node-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('filterSelect').value='all';
  document.getElementById('infoPanel').classList.add('hidden');
  // Also clear wishlist
  wishlist=[];
  updateWishlistUI();
  applySelection();
  render();
}

// ─── INFO PANEL ───────────────────────────────────────────────────────────────
function showInfo(name){
  const panel=document.getElementById('infoPanel');
  const combos=combinations.filter(([a,b])=>a===name||b===name);
  const seen=new Set();
  const unique=combos.filter(c=>{if(seen.has(c[2]))return false;seen.add(c[2]);return true;});
  if(!unique.length){panel.classList.add('hidden');return;}

  document.getElementById('infoTitle').textContent=`${name} — ${unique.length} combo${unique.length>1?'s':''}`;
  const list=document.getElementById('comboList');
  list.innerHTML='';

  unique.forEach(([a,b,result])=>{
    const partner=a===name?b:a;
    const isLocked=wishlist.some(w=>w.result===result);
    const used=getUsedSpells();
    // Gray if not locked AND either ingredient is used by a locked combo
    const isUsed = !viewMode && !isLocked && (used.has(a) || used.has(b));
    const tag=document.createElement('div');
    tag.className=`combo-tag${isLocked?' locked-tag':''}${isUsed?' used-tag':''}`;
    tag.innerHTML=`
      <div class="hold-progress"></div>
      <span class="partner" style="color:${getColor(partner)}">${partner}</span>
      <span class="arrow">→</span>
      <span class="result">${result}</span>
      ${isLocked?'<span class="lock-icon">🔒</span>':''}
      <div class="action-tabs">
        <div class="action-tab-cancel">✕ Cancel</div>
        <div class="action-tab-lock">🔒 Lock</div>
      </div>
    `;

    const cancelBtn = tag.querySelector('.action-tab-cancel');
    const lockBtn = tag.querySelector('.action-tab-lock');
    const actionTabs = tag.querySelector('.action-tabs');

    // Store combo data directly on lock button
    lockBtn._combo = {a, b, result};

    lockBtn.addEventListener('click', function(e){
      e.stopPropagation();
      e.preventDefault();
      const combo = this._combo;
      dismissActionTabs();
      tryLock(combo);
    });
    lockBtn.addEventListener('touchend', function(e){
      e.stopPropagation();
      e.preventDefault();
      const combo = this._combo;
      dismissActionTabs();
      tryLock(combo);
    });

    cancelBtn.addEventListener('click', function(e){
      e.stopPropagation();
      dismissActionTabs();
    });
    cancelBtn.addEventListener('touchend', function(e){
      e.stopPropagation();
      e.preventDefault();
      dismissActionTabs();
    });

    if(!isLocked){
      let deadTimer=null;
      let hTimer=null;
      let touchStartPos=null;
      let armed=false;

      const startHold = (e) => {
        if(armed) return;
        // Record starting touch position
        if(e.touches) touchStartPos={x:e.touches[0].clientX, y:e.touches[0].clientY};
        else touchStartPos={x:e.clientX, y:e.clientY};

        // 1.5s dead zone — just a touch, don't block scroll
        deadTimer = setTimeout(()=>{
          armed=true;
          // Now start the actual 1.5s hold progress
          tag.classList.add('holding');
          hTimer = setTimeout(()=>{
            armed=false;
            tag.classList.remove('holding');
            tag.classList.add('action-shown');
            actionTabs.classList.add('visible');
          }, 1500);
        }, 1500);
      };

      const cancelHold = (e) => {
        if(e && e.target && (e.target.classList.contains('action-tab-cancel') || e.target.classList.contains('action-tab-lock'))) return;
        if(deadTimer){ clearTimeout(deadTimer); deadTimer=null; }
        if(hTimer){ clearTimeout(hTimer); hTimer=null; }
        armed=false;
        tag.classList.remove('holding');
      };

      const onTouchMove = (e) => {
        // If finger moves more than 8px, cancel hold so scroll works
        if(!touchStartPos) return;
        const dx=e.touches[0].clientX-touchStartPos.x;
        const dy=e.touches[0].clientY-touchStartPos.y;
        if(Math.hypot(dx,dy)>8) cancelHold();
      };

      tag.addEventListener('mousedown', startHold);
      tag.addEventListener('touchstart', startHold, {passive:true});
      tag.addEventListener('touchmove', onTouchMove, {passive:true});
      tag.addEventListener('mouseup', cancelHold);
      tag.addEventListener('touchend', cancelHold);
      tag.addEventListener('mouseleave', cancelHold);
    }

    list.appendChild(tag);
  });
  panel.classList.remove('hidden');
}

function dismissActionTabs(){
  document.querySelectorAll('.action-tabs').forEach(at=>at.classList.remove('visible'));
  document.querySelectorAll('.combo-tag').forEach(t=>t.classList.remove('holding','action-shown'));
  if(holdTimer){clearTimeout(holdTimer);holdTimer=null;}
}



// ─── WISHLIST ─────────────────────────────────────────────────────────────────
function toggleWishlist(){
  wishlistOpen=!wishlistOpen;
  document.getElementById('wishlistPanel').classList.toggle('open',wishlistOpen);
}

function tryLock(combo){
  if(wishlist.some(w=>w.result===combo.result)) return;
  if(wishlist.length<5){
    wishlist.push(combo);
    updateWishlistUI();
    render();
    if(selectedNode) showInfo(selectedNode);
    if(!wishlistOpen) toggleWishlist();
  } else {
    swapPending=combo;
    openSwapModal(combo);
  }
}

function openSwapModal(combo){
  document.getElementById('swapNewCombo').innerHTML=
    `<div class="res">${combo.result}</div><div class="ings">${combo.a} + ${combo.b}</div>`;
  const sl=document.getElementById('swapSlotList');
  sl.innerHTML='';
  wishlist.forEach((w,i)=>{
    const btn=document.createElement('button');
    btn.className='swap-slot-btn';
    btn.innerHTML=`<span class="ss-num">#${i+1}</span><span class="ss-result">${w.result}</span><span class="ss-ings">${w.a} + ${w.b}</span>`;
    btn.onclick=()=>{wishlist[i]=swapPending;swapPending=null;closeSwapModal();updateWishlistUI();render();if(selectedNode)showInfo(selectedNode);if(!wishlistOpen)toggleWishlist();};
    sl.appendChild(btn);
  });
  document.getElementById('swapModal').classList.add('active');
}
function closeSwapModal(){document.getElementById('swapModal').classList.remove('active');swapPending=null;}

function updateWishlistUI(){
  document.getElementById('tabCount').textContent=wishlist.length;
  const slotsEl=document.getElementById('wishlistSlots');
  slotsEl.innerHTML='';

  for(let i=0;i<5;i++){
    const slot=document.createElement('div');
    if(i<wishlist.length){
      const w=wishlist[i];
      slot.className='slot';
      const otherUsed = new Set();
      wishlist.forEach((ow,oi)=>{ if(oi!==i){ otherUsed.add(ow.a); otherUsed.add(ow.b); } });
      const aFaded = otherUsed.has(w.a);
      const bFaded = otherUsed.has(w.b);
      slot.innerHTML=`
        <div class="slot-number">#${i+1}</div>
        <div class="slot-result">${w.result}</div>
        <div class="slot-ingredients">
          <span class="ing" style="color:${getColor(w.a)};opacity:${aFaded?'0.35':'1'}">${w.a}${aFaded?' ⚠️':''}</span>
          <span class="plus">+</span>
          <span class="ing" style="color:${getColor(w.b)};opacity:${bFaded?'0.35':'1'}">${w.b}${bFaded?' ⚠️':''}</span>
        </div>
        <div class="slot-hold-bar"></div>
        <div class="trash-overlay">🗑️</div>
      `;

      let sTimer=null, sActive=false;
      const startSH=(e)=>{
        if(e.target.classList.contains('trash-overlay')) return;
        e.preventDefault();
        sActive=true;
        slot.classList.add('holding');
        sTimer=setTimeout(()=>{
          slot.classList.remove('holding');
          slot.classList.add('trash-active');
          sActive=false;
        },3000);
      };
      const cancelSH=()=>{
        if(sTimer){clearTimeout(sTimer);sTimer=null;}
        if(sActive){slot.classList.remove('holding');sActive=false;}
      };

      slot.addEventListener('mousedown',startSH);
      slot.addEventListener('touchstart',startSH,{passive:false});
      slot.addEventListener('mouseup',cancelSH);
      slot.addEventListener('touchend',cancelSH);
      slot.addEventListener('mouseleave',cancelSH);

      slot.querySelector('.trash-overlay').addEventListener('click',e=>{
        e.stopPropagation();
        wishlist.splice(i,1);
        updateWishlistUI(); render();
        if(selectedNode) showInfo(selectedNode);
      });
      slot.querySelector('.trash-overlay').addEventListener('touchend',e=>{
        e.stopPropagation();
        wishlist.splice(i,1);
        updateWishlistUI(); render();
        if(selectedNode) showInfo(selectedNode);
      });

      slot.addEventListener('click',e=>{
        if(!e.target.classList.contains('trash-overlay')&&slot.classList.contains('trash-active'))
          slot.classList.remove('trash-active');
      });
    } else {
      slot.className='slot empty';
      slot.innerHTML=`<span class="slot-empty-label">— EMPTY SLOT ${i+1} —</span>`;
    }
    slotsEl.appendChild(slot);
  }

  if(wishlist.length===0){
    const hint=document.createElement('div');
    hint.className='wishlist-hint';
    hint.textContent='Hold any combo result for 3 seconds to lock it here.';
    slotsEl.appendChild(hint);
  }
}

function toggleViewMode(){
  viewMode = !viewMode;
  const btn = document.getElementById('viewModeBtn');
  btn.classList.toggle('active', viewMode);
  btn.textContent = viewMode ? '👁 Viewing' : '👁 View';

  if(viewMode){
    document.getElementById('infoPanel').classList.add('hidden');
    document.getElementById('wishlistTab').style.display = 'none';
    if(wishlistOpen) toggleWishlist();
  } else {
    document.getElementById('wishlistTab').style.display = '';
    if(selectedNode) showInfo(selectedNode);
  }
  // Re-render so gray state appears/disappears
  render();
}

function isPanelOpen(){
  const panel = document.getElementById('infoPanel');
  return !panel.classList.contains('hidden');
}

// ─── PAN/ZOOM ─────────────────────────────────────────────────────────────────
const graphArea=document.getElementById('graphArea');
graphArea.addEventListener('mousedown',e=>{
  if(isPanelOpen()) return;
  if(e.target.closest('.node-circle')) return;
  isDragging=true; dragStart={x:e.clientX-transform.x,y:e.clientY-transform.y};
});
window.addEventListener('mousemove',e=>{
  if(!isDragging) return;
  transform.x=e.clientX-dragStart.x; transform.y=e.clientY-dragStart.y;
  if(gEl) gEl.setAttribute('transform',`translate(${transform.x},${transform.y}) scale(${transform.scale})`);
});
window.addEventListener('mouseup',()=>isDragging=false);
graphArea.addEventListener('wheel',e=>{
  e.preventDefault();
  transform.scale=Math.max(0.3,Math.min(3,transform.scale*(e.deltaY>0?0.9:1.1)));
  if(gEl) gEl.setAttribute('transform',`translate(${transform.x},${transform.y}) scale(${transform.scale})`);
},{passive:false});

let touches=[];
graphArea.addEventListener('touchstart',e=>{
  if(isPanelOpen()) return;
  touches=Array.from(e.touches);
  if(touches.length===1) dragStart={x:touches[0].clientX-transform.x,y:touches[0].clientY-transform.y};
},{passive:false});
graphArea.addEventListener('touchmove',e=>{
  if(isPanelOpen()) return;
  e.preventDefault();
  const tc=Array.from(e.touches);
  if(tc.length===1){transform.x=tc[0].clientX-dragStart.x;transform.y=tc[0].clientY-dragStart.y;}
  else if(tc.length===2&&touches.length===2){
    const pd=Math.hypot(touches[0].clientX-touches[1].clientX,touches[0].clientY-touches[1].clientY);
    const cd=Math.hypot(tc[0].clientX-tc[1].clientX,tc[0].clientY-tc[1].clientY);
    transform.scale=Math.max(0.3,Math.min(3,transform.scale*(cd/pd)));
  }
  touches=tc;
  if(gEl) gEl.setAttribute('transform',`translate(${transform.x},${transform.y}) scale(${transform.scale})`);
},{passive:false});

document.getElementById('searchInput').addEventListener('input',function(){
  const q=this.value.trim().toLowerCase();
  if(!q){clearSelection();return;}
  const match=allNodes.find(n=>n.toLowerCase().includes(q));
  if(match){selectNode(match);return;}
  const rm=combinations.find(([,,r])=>r.toLowerCase().includes(q));
  if(rm){selectedNode=rm[0];applySelection();showInfo(rm[0]);}
});

function resetView(){transform={x:0,y:0,scale:1};render();}

// ─── INIT ─────────────────────────────────────────────────────────────────────
buildSidebar();
buildStatBar();
updateWishlistUI();
window.addEventListener('resize',render);
setTimeout(render,60);
</script>
